name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ -f .version ]; then
            VERSION=$(cat .version)
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            VERSION=${VERSION#v}
          fi
          echo "app-version=$VERSION" >> $GITHUB_OUTPUT
          echo "App Version: $VERSION"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass lftp rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload files via LFTP
        run: |
          lftp -e "set sftp:auto-confirm yes; mirror -R -v --only-newer --parallel=4 --exclude .git/ --exclude .github/ --exclude node_modules/ --exclude vendor/ --exclude storage/logs/ --exclude storage/framework/cache/ --exclude storage/framework/sessions/ --exclude storage/framework/views/ --exclude .env . ${{ secrets.APP_PATH }}; quit" -u "${{ secrets.SSH_USERNAME }}","${{ secrets.SSH_PASSWORD }}" sftp://"${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }}"

      - name: Deploy on server
        env:
          APP_VERSION: ${{ steps.version.outputs.app-version }}
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" <<'EOF'
          cd "${{ secrets.APP_PATH }}"
          
          APP_VERSION="${{ env.APP_VERSION }}"
          echo "📦 Déploiement en cours... (Version: $APP_VERSION)"
          
          # Mettre l'application en maintenance
          php artisan down
          
          # Vérifier et exécuter install.sh si présent
          if [ -f install.sh ]; then
            echo "🔧 Exécution de install.sh..."
            chmod +x install.sh
            ./install.sh
          fi
          
          # Créer la base de données SQLite si nécessaire
          if [ ! -f database/database.sqlite ]; then
            echo "💾 Création de la base de données SQLite..."
            mkdir -p database
            touch database/database.sqlite
          fi
          
          # Installer les dépendances Composer (production)
          echo "📥 Installation des dépendances Composer..."
          composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
          
          # Effacer les caches et optimiser
          echo "⚡ Optimisation de Laravel..."
          php artisan cache:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          # Exécuter les migrations
          echo "🗄️ Exécution des migrations..."
          php artisan migrate --force
          
          # Créer le lien symbolique storage
          php artisan storage:link
          
          # Redémarrer les queues
          php artisan queue:restart
          
          # Enregistrer la version
          echo "$APP_VERSION" > .version
          echo "$APP_VERSION" > storage/version.txt 2>/dev/null || true
          
          # Remettre l'application en ligne
          php artisan up
          
          echo "✅ Déploiement terminé avec succès (v$APP_VERSION) !"
          EOF
